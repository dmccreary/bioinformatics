site_name: Bioinformatics
repo_url: https://github.com/dmccreary/bioinformatics
site_url: https://dmccreary.github.io/bioinformatics/
site_description: An interactive intelligent textbook for Bioinformatics with a focus on graph analysis.
site_author: Dan McCreary

nav:
  - Home: index.md
  - About This Course: about.md
  - Course Description: course-description.md
  - Chapters:
    - List of Chapters: chapters/index.md
    - 1. Foundations of Molecular Biology: chapters/01-foundations-molecular-biology/index.md
    - 2. Biological Databases: chapters/02-biological-databases/index.md
    - 3. Bioinformatics Data Formats: chapters/03-bioinformatics-data-formats/index.md
    - 4. Graph Theory Fundamentals: chapters/04-graph-theory-fundamentals/index.md
    - 5. Graph Databases and Queries: chapters/05-graph-databases-query-languages/index.md
    - 6. Sequence Alignment: chapters/06-sequence-alignment-homology/index.md
    - 7. Phylogenetics: chapters/07-phylogenetics-evolutionary-graphs/index.md
    - 8. Structural Bioinformatics: chapters/08-structural-bioinformatics/index.md
    - 9. Protein Interaction Networks: chapters/09-protein-interaction-networks/index.md
    - 10. Genome Assembly: chapters/10-genome-assembly-variation-graphs/index.md
    - 11. Transcriptomics: chapters/11-transcriptomics-regulatory-networks/index.md
    - 12. Metabolic Pathways: chapters/12-metabolic-pathway-modeling/index.md
    - 13. Signaling and Disease: chapters/13-signaling-networks-disease/index.md
    - 14. Knowledge Graphs: chapters/14-knowledge-graphs-ontologies/index.md
    - 15. Multi-Omics Integration: chapters/15-multi-omics-graph-analytics/index.md
    - 16. Python Tools and Capstone: chapters/16-python-tools-capstone/index.md
  
  - Learning Graph:
    - Introduction: learning-graph/index.md
    - Course Description Assessment: learning-graph/course-description-assessment.md
    - Concept List: learning-graph/concept-list.md
    - Graph Quality Analysis: learning-graph/quality-metrics.md
    - Concept Taxonomy: learning-graph/concept-taxonomy.md
    - Taxonomy Distribution Report: learning-graph/taxonomy-distribution.md
    - Mascot Style Guide: learning-graph/mascot-test.md
    - Book Metrics: learning-graph/book-metrics.md
    - Chapter Metrics: learning-graph/chapter-metrics.md
    - FAQ Quality Report: learning-graph/faq-quality-report.md
  
  
  - MicroSims:
    - List of MicroSims: sims/index.md
    - Central Dogma and Its Exceptions: sims/central-dogma-exceptions/index.md
    - Central Dogma Information Flow: sims/central-dogma-flow/index.md
    - Codon Table Explorer: sims/codon-table-explorer/index.md
    - Learning Graph Viewer: sims/graph-viewer/index.md
    - Mutation Types and Their Effects on Protein Sequence: sims/mutation-types-explorer/index.md
    - Prokaryotic vs Eukaryotic Cell: sims/prokaryote-vs-eukaryote/index.md
    - Protein Structure Hierarchy: sims/protein-structure-levels/index.md


  - FAQ: faq.md
  - Glossary: glossary.md
  - About: about.md
  - License: license.md
  - Contact: contact.md

theme:
  name: material
  custom_dir: overrides
  static_templates:
    - 404.html
  logo: img/logo.png
  favicon: img/favicon.ico
  palette:
    primary: 'teal'
    accent: 'white'
  include_sidebar: true
  features:
    - content.code.copy
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - toc.follow
    - navigation.top
    - navigation.footer
    - content.action.edit

exclude_docs: |
  sims/prokaryote-vs-eukaryote/image-prompt.md
  sims/TODO.md
  sims/TODO/*.json

plugins:
  - search
  - social
  - social_override
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
      auto_caption: false
      caption_position: bottom

markdown_extensions:
  - md_in_html
  - attr_list
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      linenums: true
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - css/extra.css
  - css/mascot.css

extra_javascript:
  - js/extra.js
  - js/mathjax-config.js
  - https://unpkg.com/mathjax@3/es5/tex-chtml.js

# Watch these files for changes to trigger a rebuild
watch:
  - docs
  - mkdocs.yml

copyright: Copyright &copy; 2026 Dan McCreary. Licensed under <a href="license/">CC BY-NC-SA 4.0</a> for non-commercial use.

extra:
  # remove the made with mkdocs from the footer
  generator: false
  #analytics:
  #  provider: google
  #  property: G-XXXXXXXXXX
  schema: https://dmccreary.github.io/intelligent-textbooks/ns/textbook/v1
  textbook_name: Bioinformatics
  textbook_version: "1.0"
