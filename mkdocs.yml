theme:
  name: material
  custom_dir: overrides
  static_templates:
    - 404.html
  logo: img/logo.png
  favicon: img/favicon.ico
  palette:
    primary: 'teal'
    accent: 'white'
  include_sidebar: true
  features:
    - content.code.copy
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - toc.follow
    - navigation.top
    - navigation.footer
    - content.action.edit

exclude_docs: |
  sims/prokaryote-vs-eukaryote/image-prompt.md
  sims/TODO.md
  sims/TODO/*.json

plugins:
  - search
  - social
  - social_override
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
      auto_caption: false
      caption_position: bottom

markdown_extensions:
  - md_in_html
  - attr_list
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      linenums: true
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - css/extra.css
  - css/mascot.css

extra_javascript:
  - js/extra.js
  - js/mathjax-config.js
  - https://unpkg.com/mathjax@3/es5/tex-chtml.js

# Watch these files for changes to trigger a rebuild
watch:
  - docs
  - mkdocs.yml

