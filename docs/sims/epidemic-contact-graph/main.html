<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epidemic Contact Graph</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/vis-network/styles/vis-network.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="wrapper">
        <div id="controls">
            <button id="start-btn">Start</button>
            <button id="reset-btn">Reset</button>

            <label for="population-slider">Population: <span id="population-val">30</span></label>
            <input type="range" id="population-slider" min="10" max="60" value="30" step="5">

            <label for="contacts-slider">Contacts/day: <span id="contacts-val">3</span></label>
            <input type="range" id="contacts-slider" min="1" max="8" value="3" step="1">

            <label for="infection-slider">Infection prob: <span id="infection-val">0.3</span></label>
            <input type="range" id="infection-slider" min="0.05" max="0.8" value="0.3" step="0.05">

            <label for="recovery-slider">Recovery days: <span id="recovery-val">7</span></label>
            <input type="range" id="recovery-slider" min="3" max="21" value="7" step="1">

            <label for="speed-slider">Speed (ms/day): <span id="speed-val">800</span></label>
            <input type="range" id="speed-slider" min="200" max="2000" value="800" step="100">

            <div class="stats-section">
                <h3>Statistics</h3>
                <div class="stat-row"><span class="stat-label">Day</span><span class="stat-value" id="stat-day">0</span></div>
                <div class="stat-row"><span class="stat-label">Susceptible</span><span class="stat-value" id="stat-s">0</span></div>
                <div class="stat-row"><span class="stat-label">Infected</span><span class="stat-value" id="stat-i">0</span></div>
                <div class="stat-row"><span class="stat-label">Recovered</span><span class="stat-value" id="stat-r">0</span></div>
                <div class="stat-row"><span class="stat-label">R0 (est)</span><span class="stat-value" id="stat-r0">0.0</span></div>
            </div>

            <div class="legend-section">
                <div class="legend-item"><div class="legend-dot" style="background:#2196F3;"></div>Susceptible</div>
                <div class="legend-item"><div class="legend-dot" style="background:#F44336;"></div>Infected</div>
                <div class="legend-item"><div class="legend-dot" style="background:#4CAF50;"></div>Recovered</div>
                <div class="legend-item">
                    <div style="width:12px;height:3px;background:#F44336;margin-right:6px;flex-shrink:0;margin-top:1px;"></div>
                    Transmission edge
                </div>
                <div class="legend-item">
                    <div style="width:12px;height:1px;background:#ccc;margin-right:6px;flex-shrink:0;margin-top:1px;"></div>
                    Contact (no transmission)
                </div>
            </div>
        </div>
        <div style="flex:1;min-width:0;position:relative;">
            <div id="title-bar">Epidemic Contact Graph <span id="version">v3</span></div>
            <div id="day-display">Day 0</div>
            <div id="network-container" style="width:100%;height:100%;"></div>
        </div>
    </div>

    <div id="timeline-bar">
        <div class="timeline-segment" id="tl-s" style="background:#2196F3;width:100%;"></div>
        <div class="timeline-segment" id="tl-i" style="background:#F44336;width:0%;"></div>
        <div class="timeline-segment" id="tl-r" style="background:#4CAF50;width:0%;"></div>
    </div>

    <div id="return-link" style="display:none; padding: 8px 16px;">
        <a href=".">← Return to Lesson Plan</a>
    </div>

    <script src="script.js?v=3"></script>
</body>
</html>
